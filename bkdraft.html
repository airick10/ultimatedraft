{% extends "base.html" %}
{% block title %}Basketball Draft{% endblock %}
{% block css %}
  {{ super() }}

  <style>
    body {
      background: #d4f0e1 url("{{ url_for('static', filename='bk_back.jpg') }}") center center / cover no-repeat fixed;
    }

    .table-borderless > tbody > tr > td,
    .table-borderless > tbody > tr > th,
    .table-borderless > tfoot > tr > td,
    .table-borderless > tfoot > tr > th,
    .table-borderless > thead > tr > td,
    .table-borderless > thead > tr > th {
      border: none;
    }

    a.link-dark {
      text-decoration: none !important;
    }

    .link-dark:hover {
      text-decoration: underline !important;
    }

    a.link-light {
      text-decoration: none !important;
    }

    .link-light:hover {
      text-decoration: underline !important;
    }

    .commissioner-Regular {
      font-family: "Commissioner", sans-serif;
      font-optical-sizing: auto;
      font-weight: 400;
      font-style: normal;
      font-variation-settings:
        "slnt" 0,
        "FLAR" 0,
        "VOLM" 0;
    }

    .logo-checkbox { display: none; }
    .logo-label {
      cursor: pointer;
      display: inline-block;
      border: 3px solid transparent;
      border-radius: 8px;
      padding: 4px;
      transition: border-color 0.15s ease;
    }
    .logo-checkbox:checked + .logo-label {
      border-color: #00aaff;
      background-color: rgba(0, 170, 255, 0.15);
    }
  </style>

  <script>
const numTeams = {{ num_teams }};
const required = {
    C: numTeams * 2,
    F: numTeams * 4,
    G: numTeams * 4
};

function validateSelections() {
    const cCount = document.querySelectorAll('input.pos-C:checked').length;
    const fCount = document.querySelectorAll('input.pos-F:checked').length;
    const gCount = document.querySelectorAll('input.pos-G:checked').length;

    const cOk = cCount === required.C;
    const fOk = fCount === required.F;
    const gOk = gCount === required.G;

    document.getElementById('submit-btn').disabled = !(cOk && fOk && gOk);

    document.getElementById('c-count').textContent = `${cCount} / ${required.C}`;
    document.getElementById('f-count').textContent = `${fCount} / ${required.F}`;
    document.getElementById('g-count').textContent = `${gCount} / ${required.G}`;
}

function setPositionCheckboxes(positionClass, checked) {
    const boxes = document.querySelectorAll(`input.${positionClass}`);
    boxes.forEach(box => {
        box.checked = checked;
    });

    validateSelections();
}

document.addEventListener('DOMContentLoaded', validateSelections);
</script>
{% endblock %}


{% block body %}

<a class="link-offset-2 link-offset-3-hover link-underline link-underline-opacity-50 link-underline-opacity-75-hover link-light" href="/basketball">Go Back</a>

<h1 class="text-light">Loaded Draft: {{ draftname }}</h1>
<p class="text-light">Players: {{ players|length }}</p>
<p class="text-light">Log entries: {{ draft_log|length }}</p>

  
  {% endblock %}
